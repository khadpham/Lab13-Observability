alerts:
  - name: high_latency_p95
    severity: P2
    metric: latency_p95_ms
    operator: ">"
    threshold_ms: 2500
    condition: latency_p95_ms > 2500 for 5m
    type: symptom-based
    owner: team-oncall
    runbook: docs/alerts.md#1-high-latency-p95
    test_scenario: rag_slow
  - name: high_error_rate
    severity: P1
    metric: error_rate_pct
    operator: ">"
    threshold_pct: 5
    condition: error_rate_pct > 5 for 5m
    type: symptom-based
    owner: team-oncall
    runbook: docs/alerts.md#2-high-error-rate
    test_scenario: tool_fail
  - name: cost_budget_spike
    severity: P2
    metric: avg_cost_usd
    operator: ">"
    threshold_usd: 0.003
    condition: avg_cost_usd > 0.003 for 15m
    type: symptom-based
    owner: finops-owner
    runbook: docs/alerts.md#3-cost-budget-spike
    test_scenario: cost_spike
